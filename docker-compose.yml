version: '3.8'

services:
  # Laravel App using official PHP + Node
  # We will map a custom dockerfile or just use a generic PHP image and run 'php artisan serve'
  laravel:
    build:
      context: ./backend-laravel
      dockerfile: Dockerfile
    ports:
      - "8001:8000"
      - "5173:5173"
    volumes:
      - ./backend-laravel:/var/www/html
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=dss_hp
      - DB_USERNAME=root
      - DB_PASSWORD=root
    depends_on:
      - db
      - flask_engine

  # DSS Flask Engine
  flask_engine:
    build:
      context: ./dss-engine
    ports:
      - "5000:5000"
    volumes:
      - ./dss-engine:/app
    environment:
      - FLASK_APP=app/main.py
      - FLASK_ENV=development
      - FLASK_DEBUG=1

  # MySQL Database
  db:
    image: mysql:8.0
    ports:
      - "3308:3306"
    environment:
      - MYSQL_DATABASE=dss_hp
      - MYSQL_ROOT_PASSWORD=root
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
